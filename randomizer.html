<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Randomizer</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --surface: #16213e;
        --text: #e8e8e8;
        --muted: #a0a0a0;
        --accent: #0f3460;
        --accent-hover: #1a4a7a;
        --border: #2a2a4a;
        --output-bg: #0d0d1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px 14px;
        min-width: 280px;
        max-width: 360px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        line-height: 1.45;
        color: var(--text);
        background: var(--bg);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }

      #output {
        width: 100%;
        min-height: 80px;
        max-height: 200px;
        overflow-y: auto;
        padding: 10px 12px;
        margin-bottom: 12px;
        background: var(--output-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        color: var(--muted);
      }

      #output:empty::before {
        content: "Click Randomize on a Google Meet call page.";
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: var(--accent);
        color: var(--text);
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Speaking order</h1>
    <pre id="output"></pre>
    <div class="actions">
      <button type="button" id="randomize">Randomize</button>
      <button type="button" id="copy">Copy</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
